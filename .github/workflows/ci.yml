name: CDIdle quality

on:
  push:
    branches: [staging, main]
  pull_request:
    branches: [staging, main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci
      - name: Validate Workboard
        run: npm run board:validate
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test -- --run
      - name: Build
        run: npm run build
      - name: Production audit
        run: npm audit --omit=dev --audit-level=high
