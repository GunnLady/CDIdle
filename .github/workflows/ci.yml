name: CDIdle quality

on:
  push:
    branches: [staging, main]
  pull_request:
    branches: [staging, main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install
        run: npm ci
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start Supabase
        run: supabase start
      - name: Validate Workboard
        run: npm run board:validate
      - name: Secret audit
        run: npm run check:secrets
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test -- --run
      - name: Database tests
        run: npm run test:db
      - name: Build
        run: npm run build
      - name: Bundle budget
        run: npm run check:bundle
      - name: Production audit
        run: npm audit --omit=dev --audit-level=high
      - name: Stop Supabase
        if: always()
        run: supabase stop
